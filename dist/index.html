Not as a poster. Not as a diagram. As a functioning simulation where every concept is mechanically enforced by mathematics running at sixty frames per second.

Evolution: natural selection, mutation, adaptation, fitness, genetic drift, bottleneck effect, allele frequency, inbreeding depression, sexual selection.

Ecology: predator-prey relationships, trophic levels, carrying capacity, limiting factors, population growth, symbiotic relationships, autotrophs and heterotrophs, matter and energy flow, habitat dependency, resource competition.

DNA: base pairing, codons, gene expression, point mutation.

Twenty-two specific biology concepts. All mechanically implemented. All running live on this island right now.[[friendly]]`},{title:"Trophic Levels & The Food Web",sprite:"friendly",concepts:["Trophic Levels","Matter & Energy Flow","Food Web"],body:`The island supports ten species across five trophic levels.

Fungi at the base as decomposers. Grass and trees as producers — autotrophs. Beetles, fireflies, deer, and boar as primary consumers. Frogs and monitor lizards as secondary consumers. The hawk at the top as the apex predator.

Trophic levels describe the position of organisms in a food chain based on energy transfer from producers to consumers. Grass is a producer. Beetles are primary consumers. Frogs are secondary consumers. Hawks are apex predators.

Energy flows upward through trophic levels. Approximately 10% transfers at each step. This means the island can support many more beetles than hawks — reflected in their respective carrying capacities: 300 beetles versus 10 hawks.

The Ecosystem panel has an interactive food web diagram. When a species goes extinct, its arrows go dashed. The cascade propagates upward. The code does not model a food web. It models individual hunger. The food web emerges from that.`},{title:"Autotrophs, Heterotrophs & Symbiosis",sprite:"neutral",concepts:["Autotrophs vs Heterotrophs","Symbiotic Relationships","Decomposer Loop"],body:`Every organism on the island is either an autotroph or a heterotroph.

Autotrophs — grass and fig trees — produce their own energy using soil nutrients. They require no other organism to eat. They are the base of all energy on the island.

Heterotrophs consume other organisms. This includes every animal on the island and the fungi.

The fungi represent a symbiotic relationship with the ecosystem. They break down dead organisms and return 45% of the consumed matter as soil nutrients, indirectly helping grass and trees grow. Remove them and grass growth slows. Producers weaken. The entire food web weakens from the bottom up.

This is not a passive relationship. The decomposer loop is mechanically load-bearing. Without it, the nutrient cycle collapses and nothing grows efficiently.

The numbers below are running live.`,formula:"nutrients"},{title:"Predator-Prey Dynamics",sprite:"neutral",concepts:["Predator-Prey Relationships","Population Cycles","Ecosystem Balance"],body:`Predator-prey relationships describe interactions where one organism hunts another, creating population cycles and ecosystem balance.

In this simulation: more frogs mean more food for hawks. Hawk populations rise. Hawks eat more frogs. Frog populations decline. Hawks go hungry. Hawk populations fall. Frogs recover. The cycle continues without any line of code specifying it.

This mirrors the wolf-elk dynamics in Yellowstone National Park. When wolves were reintroduced in 1995, elk populations shifted, vegetation recovered in previously overgrazed areas, and river systems were altered by changed elk movement patterns. One predator restructured an entire ecosystem.

Predator-prey oscillations are not a game mechanic. They are a mathematical consequence of hunger, reproduction, and death running simultaneously.[[threat]]`},{title:"Carrying Capacity & Limiting Factors",sprite:"neutral",concepts:["Carrying Capacity","Limiting Factors","Logistic Population Growth"],body:`Carrying capacity is the maximum population size an environment can support based on available resources like food and space.

K is not a fixed ceiling. Every frame: effectiveK = baseK × food ratio × season multiplier.

If grass falls below optimal for deer, deer K shrinks proportionally. In winter, all K values drop. In spring they rise 15%. Deer and boar compete for the same grass — each boar removes 0.4 units from deer-accessible food supply.

When population exceeds 80% of effective K, a crowding multiplier increases hunger drain. Population growth slows as resources become limiting. This is logistic growth. Not a label on a diagram. An equation running every frame.

Limiting factors — food, space, season, disease, habitat — restrict population growth exactly as real ecological theory predicts. The numbers below are running live from this island.`,formula:"k",onEnter:(e,t)=>t(3)},{title:"Natural Selection & Adaptation",sprite:"neutral",concepts:["Natural Selection","Adaptation","Directional Selection"],body:`There is no selector.

What exists is: agents with low speed get caught. Agents with low constitution starve faster when crowded. Agents with low resilience die younger. These agents reproduce less. Over generations, the variation deltas of surviving individuals accumulate in the gene pool. The population shifts toward stronger stats. Natural selection. Without a single line of code that says prefer the fitter individual.[[threat]]

This reflects Darwin's core insight: individuals vary in heritable traits; certain traits improve survival and reproduction; successful traits become more common over generations; populations adapt to environmental conditions over time.

Adaptation is the long-term result. During a cold snap, organisms with higher heat tolerance survive at higher rates. Over multiple generations, the average heat tolerance of the population rises. The environment selected for it. The population became better adapted. Over time, this leads to directional selection — gradual shifts in population traits as an emergent, non-random process driven by environmental pressure.

Click below to trigger a disease outbreak. Watch which species takes the hit.`,onEnter:(e,t)=>t(3),trialBtn:{label:"Trigger Disease Outbreak",action:e=>e.triggerEvent("disease")}},{title:"Fitness, Genetic Drift & Bottleneck Effect",sprite:"neutral",concepts:["Fitness","Genetic Drift","Bottleneck Effect","Allele Frequency"],body:`Fitness is not physical strength. It is overall reproductive success. A hawk that catches more prey produces more offspring and passes its hunting traits forward. Over time, the average hunting ability of the population rises.

But natural selection is not the only mechanism of evolution.

Genetic drift is the random change in allele frequencies in a population, especially in small populations where chance has a strong effect. After a disaster reduces deer numbers, certain traits may become common purely by chance rather than survival advantage.

The bottleneck effect occurs when a population is drastically reduced due to an event, leaving survivors with low genetic diversity. The Florida panther. The cheetah. The northern elephant seal. Documented populations that survived bottlenecks and paid the genetic cost for generations afterward — surviving populations carry only a fraction of original genetic diversity, increasing vulnerability to future changes.

In this simulation, wildfire cuts grass by 65% instantly. Deer populations crash. Survivors carry a narrower genetic profile. Evolution resumes from what remains.[[threat]]

Click below. Watch what happens.`,onEnter:(e,t)=>t(3),trialBtn:{label:"Fire a Wildfire Now",action:e=>e.triggerEvent("wildfire")}},{title:"The Individual-Based Model",sprite:"neutral",concepts:["Individual-Based Model","Agent State Machine","Emergent Behavior"],body:`The IBM. Every animal is a separate software agent with its own state machine.

WANDER: exploring its preferred biome.
HUNT: locked onto a specific prey individual, pathfinding directly toward it. The agent must physically reach the prey's coordinates to eat it. No phantom consumption from across the map.
FLEE: predator within awareness range. Everything else abandoned.
COURT: pathfinding toward an accepted mate during breeding season.

The reasoning stat drives two things: target selection — high-reasoning agents pick prey with the best energy-gain-to-distance ratio — and path quality — low-reasoning agents add up to 63 degrees of random noise per frame.

Hawks bypass standard movement entirely: they soar in a wide ellipse around their nest tree, diving at 2.2× speed when prey is locked. Frogs must be in water to mate. Beetles must physically travel to a different tree to lay eggs.

Population dynamics emerge from thousands of these transitions running simultaneously.`},{title:"DNA, Base Pairing & Codons",sprite:"friendly",concepts:["DNA Base Pairing","Codons","Point Mutation","Gene Structure"],body:`Every species has a DNA sequence. Nine traits, each encoded by three codons. Each codon is three base pairs: A, T, G, or C.

DNA base pairing is the rule that DNA bases match in pairs — A with T, and C with G — to ensure accurate genetic replication. When DNA copies itself, correct base pairing preserves genetic information unless a mutation occurs.

Codons are groups of three DNA bases that code for amino acids, which form proteins that determine traits. A codon change in beetles can alter a protein affecting camouflage, making them harder for predators to detect.

Change a single base and the codon changes. The codon maps to a biological modifier between negative 20 and positive 20. That modifier shifts the effective stat. Change ATG to GTG in the metabolism row and every individual of that species burns energy at a different rate.

This is a point mutation. The project demonstrates it by making the consequences visible in a running simulation.

Open the Gene Lab tab at the top of the game to see it.`},{title:"Gene Expression",sprite:"neutral",concepts:["Gene Expression","Genotype vs Phenotype","Trait Modification"],body:`The full pipeline:

A/T/G/C bases form a codon. The codon maps to a modifier. The modifier adds to the species base stat. The result is clamped between 0 and 100. That number determines the observable phenotype.

This reflects real biological processes: DNA encodes traits through gene expression, mutations introduce variation within populations, and beneficial mutations increase in frequency through natural selection.

The Gene Lab phenotype panel describes what each number means in biological terms. Higher metabolism shows how many hunger units drain per second. Higher camouflage shows what percentage of predator detection is blocked. Higher speed means more distance covered per frame.

Genotype to phenotype. One pipeline. Every species. Every frame.

This creates a visible link between molecular change and organism behaviour, showing how DNA directly influences ecological success — the relationship the simulation was built to demonstrate.`},{title:"Mutation & Allele Frequency",sprite:"friendly",concepts:["Mutation","Allele Frequency","Inheritance","Mendelian Segregation"],body:`Mutation is a random change in an organism's DNA that creates new genetic variation within a population. A mutation that increases frog speed may help it escape hawk predation more often, improving survival and long-term fitness.

Designing a mutation in the Gene Lab does nothing on its own. The player must inject it.

Injecting selects specific individuals and alters their variation deltas. They are now genetically distinct from the rest of the population. Their offspring inherit the mutation with 50% probability each — Mendelian segregation applied to a continuous trait model.

The Genetics panel then tracks what percentage of the population carries the mutation over time — allele frequency. The chart shows whether it is spreading, declining, or neutral. If the mutation improves survival under current conditions, allele frequency rises. If conditions change, a previously neutral mutation may become advantageous or harmful.

Click below to inject a speed mutation into five deer right now.`,trialBtn:{label:"Inject Speed Mutation into Deer",action:e=>e.injectMutation("deer",{speed:15},5)}},{title:"Inbreeding Depression",sprite:"threat",concepts:["Inbreeding Depression","Genetic Diversity","Population Vulnerability"],body:`Every tick the simulation computes the mean variance of all nine stats across the population. Low variance means the gene pool is narrowing.

When diversity drops below a threshold, a death rate multiplier activates. Zero diversity produces up to 60% higher mortality per tick. The Genetics panel shows this as a colour-coded bar per species.

In real ecosystems, this is well-documented. After a bottleneck, the surviving population carries only a fraction of the original genetic diversity. This increases vulnerability to disease and environmental change — because fewer trait variations exist to respond to new pressures.

The cheetah. The Florida panther. The northern elephant seal. All documented cases where low genetic variation significantly reduces long-term survival capacity. The simulation demonstrates this through its inbreeding depression mechanic.

The bars below are running live. If anything is red, something on this island is in serious trouble.`,formula:"diversity"},{title:"Sexual Selection & Mate Choice",sprite:"neutral",concepts:["Sexual Selection","Fitness Signalling","Mate Choice"],body:`During breeding season, females scan males within their awareness radius. Each male receives a desirability score: the average of his speed, strength, constitution, and resilience.

The female acceptance threshold is set by her reasoning stat. High reasoning means a threshold of 66. Low reasoning means a threshold of 28. She chooses the highest-scoring male who clears her threshold and pathfinds toward him.

No programmer specified which traits should be attractive. Female choice determined it. Over generations this drives evolutionary pressure on all four signal traits simultaneously.

This models real sexual selection — mate choice creates selection pressure independent of direct survival advantage. Populations can evolve traits not because they help survival but because they attract mates. The genetic consequences are indistinguishable from natural selection in the short term.

Peacocks would understand.[[friendly]]`,onEnter:(e,t)=>t(1)},{title:"Beetle Lifecycle & Habitat Dependency",sprite:"friendly",concepts:["Habitat Dependency","Resource Competition","Lifecycle & Reproduction"],body:`Beetles do not wander freely. Each beetle has a homeTreeId — a specific tree it lives on. When not hunting, it returns to that tree.

When ready to reproduce, it acquires a breedTreeId: a different tree. It travels there, lays two to four eggs at that location, and the larvae hatch already bonded to that tree. The population hard cap is numTrees × 4. Destroy the forest and the beetle colony collapses regardless of anything else.

This models habitat dependency — beetles require trees for their entire lifecycle. Frogs require ponds to breed and desiccate rapidly away from water. Fireflies die quickly outside pond biomes. Each species has a specific habitat requirement that limits where and how much it can grow.

Resource competition is also at work: deer and boar share grass. Boar eat beetles. Every consumer competes for limited resources, enforcing the carrying capacity calculations that govern the whole system.

Monitors eat beetles. Frogs eat beetles. Hawks eat frogs. Cut the trees and the cascade reaches the hawk. One habitat. Four trophic connections.`,onEnter:(e,t)=>t(1),highlightEl:".island-canvas-wrap"},{title:"Environmental Events & Ecosystem Disturbance",sprite:"neutral",concepts:["Bottleneck Effect","Ecological Resilience","Ecosystem Disturbance"],body:`Six environmental events fire at random intervals. Drought. Wildfire. Volcanic ash. Cold snap. Disease outbreak. New migration.

Each is a real ecological concept with real mathematical consequences. Wildfire cuts grass by 65% instantly and initiates a bottleneck event. Survivors carry a narrower genetic profile. Evolution resumes from what remains.

The cascade from a wildfire: trees burn, beetles lose habitat. Deer populations that initially increase as predators lose forest cover later crash from starvation as plant resources deplete. Hawk populations follow. This chain reaction shows how interconnected ecosystems truly are.

These disturbances are based on real-world events becoming more frequent due to climate change. In real ecosystems, they reduce population sizes, alter habitats, and shift species distributions. In the simulation they force rapid ecological change — demonstrating how fragile ecosystems respond to sudden environmental stress.

A pressure indicator rises in the Events panel between events. Players can watch it build and prepare mutations in advance.`,onEnter:(e,t)=>t(3),trialBtn:{label:"Fire a Wildfire Now",action:e=>e.triggerEvent("wildfire")}},{title:"The Decomposer Loop",sprite:"neutral",concepts:["Matter & Energy Flow","Nutrient Cycling","Ecosystem Stability"],body:`Dead matter accumulates from every animal death and plant senescence. Fungi consume it and return 45% as soil nutrients. Nutrients accelerate producer growth by up to 65%.

Fungi are not decorative. Remove them and grass grows slower, trees seed less often, herbivores face food scarcity, and the food web weakens from the bottom.

This is matter and energy flow through an ecosystem. Dead organisms are not wasted. Their stored chemical energy re-enters the system through decomposition, becoming available to autotrophs again. The carbon cycle, modelled.

The ecological system models food webs, energy transfer, and population regulation. Producers grow using logistic models limited by carrying capacity, while consumers transfer energy through predation. The decomposer loop closes the cycle — energy and matter circulate continuously through the system, never created or destroyed, only transformed.

It runs whether or not anyone is watching it.`,formula:"nutrients"},{title:"The Three-Topic Connection",sprite:"friendly",concepts:["Evolution-Ecology-DNA Connection","Systems Thinking","Emergent Behaviour"],body:`Here is the required connection between Evolution, Ecology, and DNA.

A mutation changes a codon — a point mutation in the camouflage gene. That codon change alters gene expression and raises the effective camouflage stat. In the next predation event, camouflaged individuals are harder to detect. They survive more often. They reproduce more often. Their offspring inherit the mutation with 50% probability. Allele frequency rises. The beetle population stabilises. The food web holds.

DNA drove Evolution drove Ecology. One codon change. Three topics. Connected through a single base pair substitution and its consequences in a living simulation.

The relationship is circular: genetics produces variation through mutation, ecology determines which traits are advantageous, and evolution filters those traits through survival and reproduction. These interactions create emergent behaviour — population cycles, ecosystem stability, and collapse events that were never explicitly programmed.

Click below to trigger a cold snap. Watch the chain.[[friendly]]`,trialBtn:{label:"Trigger Cold Snap",action:e=>e.triggerEvent("cold_snap")}},{title:"Real-World Significance",sprite:"friendly",concepts:["Conservation Biology","Climate Change","Island Biogeography","Antibiotic Resistance"],body:`The systems in this simulation are motivated by real biological, ecological, and environmental processes observed in natural ecosystems.

Yellowstone National Park. When wolves were reintroduced in 1995, elk populations shifted, vegetation recovered in overgrazed areas, and river systems changed because elk avoided certain valleys. One predator-prey relationship restructured an entire ecosystem. This simulation models that same chain reaction every frame.

Antibiotic resistance demonstrates natural selection in real time. Bacteria with resistance genes survive antibiotic treatment and dominate the population. The simulation shows the identical mechanism through cold snaps and heat tolerance — organisms with the right trait survive, reproduce, shift the allele frequency.

Endangered species such as cheetahs and Florida panthers demonstrate the real cost of the bottleneck effect. Critically low genetic diversity increases disease vulnerability and reduces adaptive capacity. The inbreeding depression mechanic in this simulation models exactly that consequence.

The ability for organisms to migrate and colonise the island reflects real ecological processes such as species dispersal and island biogeography. In nature, ecosystems are constantly shaped by migration events, where new species arrive, compete, and either integrate or go extinct depending on environmental conditions.[[friendly]]`,onEnter:(e,t)=>t(5)},{title:"Rationale, Reflection & Works Cited",sprite:"neutral",concepts:["Design Rationale","Individual Reflection","Simulation Limitations"],body:`Why a game.

A traditional explanation cannot show all of these concepts simultaneously. A poster shows one diagram. A game lets evolution, ecology, and genetics happen at the same time, and lets you examine each one while the others continue running.

The god perspective was deliberate — seeing the entire island makes complex interactions legible. Sequential species arrival was deliberate — complexity builds gradually so each relationship is visible before the next one arrives. The gene editor makes mutations interactive so you can watch consequences rather than wait for random chance.

Simplifications were necessary and honest. Real DNA has billions of base pairs. This has nine traits, three codons each. Real ecosystems take centuries to show evolutionary change. This compresses it to minutes. Every simplification was a trade between accuracy and observability.

What was learned: before building this, evolution was a concept that happened over millions of years to populations you could not observe. After writing the natural selection code, it became a mathematical consequence of survival probability and reproduction rate. The mechanism became visible. Natural selection was never coded. It appeared.

Biology is not a set of isolated topics. It is an interconnected system where genetics determines variation, ecology determines environmental pressure, and evolution determines long-term change. By having these relationships run in real time, the Island of Life allows anyone to observe how small molecular changes can scale into large ecosystem-level effects.
